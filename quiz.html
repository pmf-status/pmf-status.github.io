<!doctype html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vježbanje, Geografija PMF prijemni</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --ink: #1b2a23;
    --parchment: #f3ead9;
    --clay: #c1693c;
    --teal: #5f8575;
    --line: rgba(27,42,35,0.12);
    --correct: #3a7d55;
    --wrong: #c1693c;
    --correct-bg: rgba(58,125,85,0.1);
    --wrong-bg: rgba(193,105,60,0.1);
    --btn-orange: #D97757;
    --btn-orange-hover: #c4673f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .contours {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.12;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }
  .back-link:hover { text-decoration: underline; }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: clamp(24px, 5vw, 36px);
    line-height: 1.15;
    margin-bottom: 28px;
  }

  /* ── SETUP SCREEN ── */
  #setupScreen { }

  .setup-card {
    background: #fffaf0;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .setup-card h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .setup-card p {
    font-size: 14px;
    color: rgba(27,42,35,0.65);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
    display: block;
  }

  .num-input {
    width: 100%;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--parchment);
    color: var(--ink);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.15s;
  }
  .num-input:focus { border-color: var(--teal); }

  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .radio-opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: var(--parchment);
    transition: border-color 0.15s, background 0.15s;
    font-size: 14px;
    line-height: 1.4;
  }
  .radio-opt:hover { border-color: var(--teal); }
  .radio-opt input { margin-top: 2px; accent-color: var(--teal); }
  .radio-opt.selected { border-color: var(--teal); background: rgba(95,133,117,0.07); }
  .radio-opt strong { display: block; margin-bottom: 2px; }
  .radio-opt span { color: rgba(27,42,35,0.6); font-size: 13px; }

  .start-btn {
    width: 100%;
    padding: 14px;
    background: var(--btn-orange);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }
  .start-btn:hover { background: var(--btn-orange-hover); }
  .start-btn:active { transform: scale(0.98); }

  /* ── QUIZ SCREEN ── */
  #quizScreen { display: none; }

  .progress-bar-wrap {
    background: var(--line);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 13px;
    color: rgba(27,42,35,0.5);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .q-category {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 10px;
  }

  .q-text {
    font-family: 'Source Serif 4', serif;
    font-size: clamp(17px, 3.5vw, 22px);
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 28px;
  }

  /* Multiple choice options */
  .mc-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .mc-btn {
    background: #fffaf0;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .mc-btn:hover:not(:disabled) { border-color: var(--teal); background: rgba(95,133,117,0.06); }
  .mc-btn:disabled { cursor: default; }
  .mc-btn.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .mc-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .mc-btn.reveal-correct { border-color: var(--correct); background: var(--correct-bg); }

  /* Text input mode */
  .text-input-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .text-answer-input {
    flex: 1;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: #fffaf0;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .text-answer-input:focus { border-color: var(--teal); }
  .text-answer-input.correct { border-color: var(--correct); background: var(--correct-bg); }
  .text-answer-input.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

  .submit-btn {
    padding: 13px 22px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .submit-btn:hover { background: #4a6d5f; }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }

  .feedback-box {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
  }
  .feedback-box.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid rgba(58,125,85,0.25); }
  .feedback-box.wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid rgba(193,105,60,0.25); }

  .next-btn {
    padding: 12px 28px;
    background: var(--btn-orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: none;
  }
  .next-btn:hover { background: var(--btn-orange-hover); }

  .skip-btn {
    padding: 12px 20px;
    background: transparent;
    color: rgba(27,42,35,0.45);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 10px;
  }
  .skip-btn:hover { border-color: var(--ink); color: var(--ink); }

  .btn-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }

  /* ── RESULTS SCREEN ── */
  #resultsScreen { display: none; }

  .score-card {
    background: #fffaf0;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 36px;
    text-align: center;
    margin-bottom: 28px;
  }

  .score-num {
    font-family: 'Source Serif 4', serif;
    font-size: clamp(56px, 16vw, 88px);
    font-weight: 700;
    color: var(--teal);
    line-height: 1;
  }

  .score-of {
    font-size: 16px;
    color: rgba(27,42,35,0.55);
    margin-top: 4px;
    margin-bottom: 20px;
  }

  .score-pct {
    font-size: 14px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    display: inline-block;
  }
  .score-pct.great { background: var(--correct-bg); color: var(--correct); }
  .score-pct.ok { background: rgba(193,105,60,0.1); color: var(--clay); }
  .score-pct.bad { background: var(--wrong-bg); color: var(--wrong); }

  .mistakes-section h3 {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .mistake-item {
    background: #fffaf0;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .mistake-q {
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .mistake-your {
    color: var(--wrong);
    margin-bottom: 3px;
  }

  .mistake-correct {
    color: var(--correct);
    font-weight: 600;
  }

  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: var(--btn-orange);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 24px;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: var(--btn-orange-hover); }

  .all-correct-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--correct);
    font-weight: 600;
    font-size: 16px;
  }
</style>
</head>
<body>

<svg class="contours" viewBox="0 0 800 1200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#1b2a23" stroke-width="1.2">
    <path d="M -50 100 C 150 60, 300 160, 500 90 S 800 140, 900 80" />
    <path d="M -50 180 C 150 140, 300 240, 500 170 S 800 220, 900 160" />
    <path d="M -50 260 C 150 220, 300 320, 500 250 S 800 300, 900 240" />
    <path d="M -50 500 C 200 460, 350 560, 550 480 S 850 540, 900 470" />
    <path d="M -50 570 C 200 530, 350 630, 550 550 S 850 610, 900 540" />
    <path d="M -50 640 C 200 600, 350 700, 550 620 S 850 680, 900 610" />
    <path d="M -50 900 C 180 850, 380 980, 560 900 S 820 950, 900 880" />
    <path d="M -50 970 C 180 920, 380 1050, 560 970 S 820 1020, 900 950" />
  </g>
</svg>

<div class="wrap">
  <a href="index.html" class="back-link">← Nazad na rang listu</a>

  <!-- SETUP -->
  <div id="setupScreen">
    <div class="eyebrow">ePMF · Vježbanje</div>
    <h1>Priprema za prijemni</h1>

    <div class="setup-card">
      <h2>Mod vježbanja</h2>
      <p>Odaberi kako želiš vježbati.</p>
      <div class="radio-group" id="modeGroup">
        <label class="radio-opt selected" id="opt-mc">
          <input type="radio" name="mode" value="mc" checked />
          <div>
            <strong>Kviz, 4 ponuđena odgovora</strong>
            <span>Svaki put drugačija kombinacija netačnih odgovora</span>
          </div>
        </label>
        <label class="radio-opt" id="opt-text">
          <input type="radio" name="mode" value="text" />
          <div>
            <strong>Unos teksta, ukucaj odgovor</strong>
            <span>Prihvata djelimične odgovore, ne razlikuje velika/mala slova</span>
          </div>
        </label>
      </div>
    </div>

    <div class="setup-card">
      <h2>Broj pitanja</h2>
      <p>Koliko pitanja želiš u ovom krugu?</p>
      <label class="field-label" for="numQ">Broj pitanja (1–300)</label>
      <input type="number" id="numQ" class="num-input" min="1" max="300" value="20" />
    </div>

    <div class="setup-card">
      <h2>Feedback</h2>
      <p>Kada želiš da saznaš da li si tačno odgovorio?</p>
      <div class="radio-group" id="feedbackGroup">
        <label class="radio-opt selected" id="opt-immediate">
          <input type="radio" name="feedback" value="immediate" checked />
          <div>
            <strong>Odmah, posle svakog pitanja</strong>
            <span>Odmah vidiš da li si pogodio</span>
          </div>
        </label>
        <label class="radio-opt" id="opt-end">
          <input type="radio" name="feedback" value="end" />
          <div>
            <strong>Na kraju, rezultati tek na kraju</strong>
            <span>Saznaš gdje si pogriješio tek kad završiš sve</span>
          </div>
        </label>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">Počni vježbanje →</button>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen">
    <div class="eyebrow">ePMF · Vježbanje</div>
    <div class="progress-label">
      <span id="progressText">Pitanje 1 od 20</span>
      <span id="scoreText">0 tačno</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>

    <div class="q-category" id="qCategory"></div>
    <div class="q-text" id="qText"></div>

    <!-- MC options -->
    <div class="mc-options" id="mcOptions"></div>

    <!-- Text input -->
    <div id="textInputArea" style="display:none">
      <div class="text-input-wrap">
        <input type="text" class="text-answer-input" id="textAnswer" placeholder="Ukucaj odgovor…" autocomplete="off" />
        <button class="submit-btn" id="submitTextBtn" onclick="submitText()">Provjeri</button>
      </div>
    </div>

    <div class="feedback-box" id="feedbackBox"></div>

    <div class="btn-row">
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Sljedeće pitanje →</button>
      <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">Preskoči</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsScreen">
    <div class="eyebrow">ePMF · Rezultati</div>
    <h1>Rezultati</h1>
    <div class="score-card">
      <div class="score-num" id="scoreNum"></div>
      <div class="score-of" id="scoreOf"></div>
      <div class="score-pct" id="scorePct"></div>
    </div>

    <div class="mistakes-section" id="mistakesSection">
      <h3>Greške</h3>
      <div id="mistakesList"></div>
    </div>

    <div style="text-align:center">
      <button class="restart-btn" onclick="goSetup()">↺ Ponovi vježbanje</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  BAZA PITANJA
//  Format: { cat, q, a: [tačan, ...netačni x11] }
//  Indeks 0 je uvijek tačan odgovor, ostatak su netačni.
// ═══════════════════════════════════════════════════════
const QDB = [
// ── GEOGRAFIJA 1. RAZRED ──
{cat:"Geo 1. razred", q:"Ideju temperaturnog gradijenta, na primjeru vulkana Čimboraso, predstavio je:", a:["Aleksandar fon Humbolt","Karl Riter","Bernhard Varenijus","Eratosten","Klaudije Ptolemej","Imanel Kant","Majnder Veren","Alfred Veger","Franc Boas","Džordž Perkins Mars","Ferdinand fon Richthofen","Vidal de la Blaš"]},
{cat:"Geo 1. razred", q:"Kartografska disciplina koja koristi računarske programe za prikupljanje, analizu i sintezu prostornih podataka i kreiranje geografskih karata naziva se:", a:["digitalna kartografija","tematska kartografija","aerofotogrametrija","topografija","geodezija","fotogrametrija","batimetrija","planimetrija","hidrografija","kartometrija","stereokartogeafija","georadar"]},
{cat:"Geo 1. razred", q:"Mišljenje da Zemlja ima oblik valjka koji lebdi u slobodnom prostoru zagovarao je:", a:["Anaksimander","Tales iz Mileta","Pitik","Eratosten","Aristotel","Platon","Strabon","Ptolomej","Herodot","Arkimed","Ksenofan","Empedokle"]},
{cat:"Geo 1. razred", q:"'Ocem geografije' smatra se:", a:["Eratosten","Strabon","Ptolemej","Herodot","Tales","Aristotel","Hipokrat","Anaksimander","Pitagora","Ksenofan","Pausanija","Plutarh"]},
{cat:"Geo 1. razred", q:"Ko je predvodio pomorsku ekspediciju kojom je dokazan sferni oblik Zemlje?", a:["Fernando Magelan","Kristofor Kolumbo","Vasko da Gama","Džon Kabot","Amerigo Vespuči","Bartolomeo Dijaz","Džejms Kuk","Fransisko Pizaro","Frensis Drejk","Pedro Kabal","Žak Kartije","Fridrih Korc"]},
{cat:"Geo 1. razred", q:"Prilikom prelaska datumske granice dodajemo jedan dan kada se krećemo:", a:["od istoka ka zapadu","od zapada ka istoku","od severa ka jugu","od juga ka severu","duž ekvatorijalne linije","u pravcu nultog meridijana","duž povratnika Raka","duž polarnog kruga","u smjeru kazaljke na satu","u smjeru suprotnom od kretanja Sunca","od ekvatora ka polovima","duž 90° geografske dužine"]},
{cat:"Geo 1. razred", q:"Ljetno računanje vremena počinje posljednje nedjelje u mjesecu:", a:["martu","aprilu","februaru","januaru","maju","oktobru","novembru","decembru","septembru","junu","avgustu","julu"]},
{cat:"Geo 1. razred", q:"Zimsko računanje vremena počinje posljednje nedjelje u mjesecu:", a:["oktobru","novembru","septembru","avgustu","martu","aprilu","januaru","februaru","junu","julu","decembru","maju"]},
{cat:"Geo 1. razred", q:"U kom mjesecu je Zemlja najbliža Suncu?", a:["januaru","februaru","martu","junu","julu","avgustu","decembru","novembru","aprilu","maju","septembru","oktobru"]},
{cat:"Geo 1. razred", q:"U kom mjesecu je Zemlja najudaljenija od Sunca?", a:["julu","junu","avgustu","januaru","decembru","februaru","maju","oktobru","septembru","novembru","aprilu","martu"]},
{cat:"Geo 1. razred", q:"Na dan martovske ravnodnevnice (20. mart) na južnoj hemisferi počinje:", a:["jesen","proljeće","ljeto","zima","suva sezona","monsunska sezona","polarni dan","polarni mrak","ekvinokcij","solsticij","perihelij","afelij"]},
{cat:"Geo 1. razred", q:"Koje godine je Milutin Milanković izvršio reviziju julijanskog kalendara?", a:["1923. godine","1912. godine","1900. godine","1935. godine","1918. godine","1905. godine","1941. godine","1887. godine","1930. godine","1946. godine","1896. godine","1915. godine"]},
{cat:"Geo 1. razred", q:"Koliko dana ima godina u lunarnom kalendaru?", a:["354 dana","365 dana","360 dana","350 dana","366 dana","355 dana","364 dana","370 dana","348 dana","357 dana","362 dana","352 dana"]},
{cat:"Geo 1. razred", q:"Dio fizičke geografije koji se bavi proučavanjem razvoja geografskog omotača Zemlje u prošlosti naziva se:", a:["paleogeografija","geomorfologija","klimatologija","hidrologija","pedogeografija","biogeografija","litogeografija","hronogeografija","geoarheologija","paleoklimatologija","stratigrafija","paleoekologija"]},
{cat:"Geo 1. razred", q:"Kenozoik je počeo prije oko:", a:["66 miliona godina","100 miliona godina","250 miliona godina","541 miliona godina","23 miliona godina","145 miliona godina","35 miliona godina","80 miliona godina","50 miliona godina","200 miliona godina","300 miliona godina","400 miliona godina"]},
{cat:"Geo 1. razred", q:"Na koliko perioda je podijeljeni mezozoik?", a:["tri perioda","dva perioda","četiri perioda","pet perioda","šest perioda","jedan period","sedam perioda","osam perioda","devet perioda","deset perioda","jedanaest perioda","dvanaest perioda"]},

];

// ═══════════════════════════════════════════════════════
//  STANJE
// ═══════════════════════════════════════════════════════
let mode = 'mc';
let feedbackMode = 'immediate';
let questions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let mistakes = [];
let userAnswers = []; // for 'end' mode

// ═══════════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.radio-opt').forEach(opt => {
  opt.addEventListener('click', function() {
    const inp = this.querySelector('input');
    const group = inp.name;
    document.querySelectorAll(`input[name="${group}"]`).forEach(i => {
      i.closest('.radio-opt').classList.remove('selected');
    });
    inp.checked = true;
    this.classList.add('selected');
  });
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  mode = document.querySelector('input[name="mode"]:checked').value;
  feedbackMode = document.querySelector('input[name="feedback"]:checked').value;
  const n = Math.min(Math.max(parseInt(document.getElementById('numQ').value) || 10, 1), QDB.length);

  // pick n random questions
  questions = shuffle(QDB).slice(0, n);
  currentIdx = 0;
  score = 0;
  mistakes = [];
  userAnswers = [];

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
//  QUIZ RENDERING
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const total = questions.length;

  // progress
  document.getElementById('progressText').textContent = `Pitanje ${currentIdx + 1} od ${total}`;
  document.getElementById('scoreText').textContent = `${score} tačno`;
  document.getElementById('progressBar').style.width = `${(currentIdx / total) * 100}%`;

  document.getElementById('qCategory').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;

  // hide feedback
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = mode === 'text' ? 'inline-block' : 'none';

  if (mode === 'mc') {
    document.getElementById('mcOptions').style.display = 'flex';
    document.getElementById('textInputArea').style.display = 'none';
    renderMC(q);
  } else {
    document.getElementById('mcOptions').style.display = 'none';
    document.getElementById('textInputArea').style.display = 'block';
    renderText(q);
  }
}

function renderMC(q) {
  // pick 3 random wrong + 1 correct, shuffle
  const wrongs = shuffle(q.a.slice(1)).slice(0, 3);
  const opts = shuffle([q.a[0], ...wrongs]);
  const container = document.getElementById('mcOptions');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mc-btn';
    btn.textContent = opt;
    btn.onclick = () => selectMC(btn, opt, q.a[0]);
    container.appendChild(btn);
  });
}

function selectMC(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.mc-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = chosen === correct;

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreText').textContent = `${score} tačno`;
    if (feedbackMode === 'immediate') showFeedback(true, correct);
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('reveal-correct'); });
    mistakes.push({ q: questions[currentIdx].q, yours: chosen, correct });
    if (feedbackMode === 'immediate') showFeedback(false, correct);
  }

  userAnswers.push({ q: questions[currentIdx], chosen, correct, isCorrect });

  if (feedbackMode === 'end') {
    showNextBtn();
  }
}

function renderText(q) {
  const inp = document.getElementById('textAnswer');
  inp.value = '';
  inp.className = 'text-answer-input';
  inp.disabled = false;
  document.getElementById('submitTextBtn').disabled = false;
  inp.focus();
  inp.onkeydown = e => { if (e.key === 'Enter') submitText(); };
}

function submitText() {
  if (answered) return;
  const q = questions[currentIdx];
  const inp = document.getElementById('textAnswer');
  const raw = inp.value.trim();
  if (!raw) return;

  answered = true;
  inp.disabled = true;
  document.getElementById('submitTextBtn').disabled = true;
  document.getElementById('skipBtn').style.display = 'none';

  const isCorrect = checkTextAnswer(raw, q.a[0]);

  if (isCorrect) {
    inp.classList.add('correct');
    score++;
    document.getElementById('scoreText').textContent = `${score} tačno`;
    if (feedbackMode === 'immediate') showFeedback(true, q.a[0]);
  } else {
    inp.classList.add('wrong');
    mistakes.push({ q: q.q, yours: raw, correct: q.a[0] });
    if (feedbackMode === 'immediate') showFeedback(false, q.a[0]);
  }

  userAnswers.push({ q, chosen: raw, correct: q.a[0], isCorrect });

  if (feedbackMode === 'end') {
    showNextBtn();
  }
}

function checkTextAnswer(given, correct) {
  const norm = s => s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[čć]/g,'c').replace(/š/g,'s').replace(/ž/g,'z').replace(/đ/g,'d')
    .trim();

  const g = norm(given);
  const c = norm(correct);

  if (g === c) return true;
  if (c.includes(g) && g.length >= 3) return true;

  // check if any token in the answer matches a token in correct
  const parts = c.split(/[\s,\/]+/).filter(p => p.length >= 3);
  for (const p of parts) {
    if (g === p || g.includes(p) || p.includes(g)) return true;
  }
  return false;
}

function skipQuestion() {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  mistakes.push({ q: q.q, yours: '(preskočeno)', correct: q.a[0] });
  userAnswers.push({ q, chosen: '(preskočeno)', correct: q.a[0], isCorrect: false });
  if (feedbackMode === 'immediate') {
    showFeedback(false, q.a[0], true);
  } else {
    showNextBtn();
  }
}

function showFeedback(correct, answer, skipped) {
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block';
  if (correct) {
    fb.className = 'feedback-box correct';
    fb.textContent = '✓ Tačno!';
  } else if (skipped) {
    fb.className = 'feedback-box wrong';
    fb.textContent = `Preskočeno. Tačan odgovor: ${answer}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.textContent = `✗ Netačno. Tačan odgovor: ${answer}`;
  }
  showNextBtn();
}

function showNextBtn() {
  const nextBtn = document.getElementById('nextBtn');
  const isLast = currentIdx === questions.length - 1;
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = isLast ? 'Završi →' : 'Sljedeće pitanje →';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════
function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreOf').textContent = `od ${total} pitanja`;

  const pctEl = document.getElementById('scorePct');
  pctEl.textContent = `${pct}% tačno`;
  pctEl.className = 'score-pct ' + (pct >= 75 ? 'great' : pct >= 50 ? 'ok' : 'bad');

  // if 'end' mode, collect mistakes from userAnswers
  const allMistakes = userAnswers.filter(a => !a.isCorrect).map(a => ({
    q: a.q.q,
    yours: a.chosen,
    correct: a.correct
  }));

  const listEl = document.getElementById('mistakesList');
  const ms = feedbackMode === 'end' ? allMistakes : mistakes;

  if (ms.length === 0) {
    listEl.innerHTML = '<div class="all-correct-msg">🎉 Sve tačno! Odlično!</div>';
    document.querySelector('.mistakes-section h3').style.display = 'none';
  } else {
    document.querySelector('.mistakes-section h3').style.display = 'block';
    listEl.innerHTML = ms.map(m => `
      <div class="mistake-item">
        <div class="mistake-q">${m.q}</div>
        <div class="mistake-your">Tvoj odgovor: ${m.yours}</div>
        <div class="mistake-correct">Tačan odgovor: ${m.correct}</div>
      </div>
    `).join('');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goSetup() {
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
