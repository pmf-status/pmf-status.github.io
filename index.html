<!doctype html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pavle Palikuća — Rang lista, Geoprostorni analitičar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink:#1b2a23;
    --parchment:#f3ead9;
    --clay:#c1693c;
    --teal:#5f8575;
    --line: rgba(27,42,35,0.12);
    --send-orange:#D97757;
    --send-orange-hover:#c4673f;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--parchment);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  /* topographic contour-line background, drawn once as SVG pattern */
  .contours{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.16;
    pointer-events:none;
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:720px;
    margin:0 auto;
    padding:48px 24px 80px;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--teal);
    font-weight:600;
    margin-bottom:8px;
  }

  h1{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:clamp(28px, 5vw, 40px);
    line-height:1.15;
    margin:0 0 6px;
  }

  .subtitle{
    color:rgba(27,42,35,0.65);
    font-size:15px;
    margin-bottom:36px;
  }

  .card{
    background:#fffaf0;
    border:1px solid var(--line);
    border-radius:18px;
    padding:36px;
    text-align:center;
    box-shadow:0 1px 2px rgba(27,42,35,0.04);
  }

  .rank-label{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--teal);
    font-weight:600;
    margin-bottom:12px;
  }

  .rank-number{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:clamp(64px, 18vw, 104px);
    line-height:1;
    color:var(--clay);
  }

  .rank-of{
    font-size:18px;
    color:rgba(27,42,35,0.6);
    margin-top:4px;
  }

  .stats{
    display:flex;
    justify-content:center;
    gap:36px;
    margin-top:28px;
    padding-top:24px;
    border-top:1px solid var(--line);
  }

  .stat .num{
    font-family:'Source Serif 4', serif;
    font-weight:600;
    font-size:24px;
  }

  .stat .lbl{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:rgba(27,42,35,0.55);
    margin-top:2px;
  }

  .updated{
    text-align:center;
    font-size:13px;
    color:rgba(27,42,35,0.5);
    margin-top:18px;
  }

  .refresh-row{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-top:28px;
  }

  .refresh-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--send-orange);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:12px 26px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 1px 2px rgba(27,42,35,0.15);
    transition:background 0.15s ease, transform 0.1s ease;
  }

  .refresh-btn:hover{
    background:var(--send-orange-hover);
  }

  .refresh-btn:active{
    transform:scale(0.97);
  }

  .refresh-btn:disabled{
    opacity:0.6;
    cursor:default;
  }

  .refresh-btn .icon{
    display:inline-block;
    transition:transform 0.5s ease;
  }

  .refresh-btn.spinning .icon{
    animation:spin 0.8s linear infinite;
  }

  @keyframes spin{
    to{ transform:rotate(360deg); }
  }

  .refresh-status{
    font-size:13px;
    color:rgba(27,42,35,0.55);
    text-align:center;
    max-width:480px;
  }

  .refresh-status.error{
    color:var(--clay);
  }

  .quiz-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:transparent;
    color:var(--teal);
    border:1px solid var(--teal);
    border-radius:999px;
    padding:11px 26px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease, transform 0.1s ease;
  }

  .quiz-link:hover{
    background:var(--teal);
    color:#fffaf0;
  }

  .quiz-link:active{
    transform:scale(0.97);
  }

  .quiz-link .icon{
    display:inline-block;
    font-size:14px;
  }

  .live-badge{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--send-orange);
    border:1px solid var(--send-orange);
    border-radius:999px;
    padding:2px 8px;
    margin-left:8px;
    vertical-align:middle;
  }

  details{
    margin-top:40px;
  }

  summary{
    cursor:pointer;
    font-weight:600;
    font-size:14px;
    color:var(--teal);
    list-style:none;
  }
  summary::-webkit-details-marker{ display:none; }
  summary:before{
    content:"→ ";
  }
  details[open] summary:before{
    content:"↓ ";
  }

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
    font-size:14px;
    background:#fffaf0;
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
  }

  th,td{
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
  }

  th{
    background:rgba(95,133,117,0.12);
    font-weight:600;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }

  tr.highlight td{
    background:rgba(193,105,60,0.14);
    font-weight:600;
  }

  .empty, .loading{
    text-align:center;
    color:rgba(27,42,35,0.6);
    padding:40px 0;
  }
</style>
</head>
<body>

<svg class="contours" viewBox="0 0 800 1200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#1b2a23" stroke-width="1.2">
    <path d="M -50 100 C 150 60, 300 160, 500 90 S 800 140, 900 80" />
    <path d="M -50 180 C 150 140, 300 240, 500 170 S 800 220, 900 160" />
    <path d="M -50 260 C 150 220, 300 320, 500 250 S 800 300, 900 240" />
    <path d="M -50 500 C 200 460, 350 560, 550 480 S 850 540, 900 470" />
    <path d="M -50 570 C 200 530, 350 630, 550 550 S 850 610, 900 540" />
    <path d="M -50 640 C 200 600, 350 700, 550 620 S 850 680, 900 610" />
    <path d="M -50 900 C 180 850, 380 980, 560 900 S 820 950, 900 880" />
    <path d="M -50 970 C 180 920, 380 1050, 560 970 S 820 1020, 900 950" />
  </g>
</svg>

<div class="wrap">
  <div class="eyebrow">ePMF · Prijemni ispit 2026</div>
  <h1>Pavle Palikuća</h1>
  <div class="subtitle">Geografija — Geoprostorni analitičar · rang po zbiru ocjena 4 godine srednje škole</div>

  <div id="content" class="card">
    <div class="loading">Učitavanje podataka…</div>
  </div>

  <div class="refresh-row">
    <button id="refreshBtn" class="refresh-btn" onclick="refreshLive()">
      <span class="icon">⟳</span>
      <span class="label">Osvježi sada</span>
    </button>
    <div id="refreshStatus" class="refresh-status"></div>
  </div>

  <div class="refresh-row">
    <a href="quiz.html" class="quiz-link">
      <span class="icon">✎</span>
      <span class="label">Vježbaj za prijemni</span>
    </a>
  </div>

  <details id="listDetails">
    <summary>Prikaži cijelu rang listu</summary>
    <table id="rankTable">
      <thead>
        <tr><th>#</th><th>Ime i prezime</th><th>Ukupno</th></tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>
  </details>
</div>

<script>
  const API_URL = "https://eportal.pmf.uns.ac.rs/ePMFWebServisi/prijemni/getPrijave";
  const GRUPA_ID = 11; // Geografija
  const PROFIL_ID = 11; // Geoprostorni analitičar
  const TARGET_IME_RAW = "Pavle";
  const TARGET_PREZIME_RAW = "Palikuća";

  function normalize(str) {
    return (str || "")
      .toString()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function render(data, opts) {
    opts = opts || {};
    const content = document.getElementById('content');
    const t = data.target;

    if (t) {
      content.innerHTML = `
        <div class="rank-label">Trenutna pozicija ${opts.live ? '<span class="live-badge">live</span>' : ''}</div>
        <div class="rank-number">#${t.rang}</div>
        <div class="rank-of">od ${data.ukupnoKandidata} prijavljenih</div>
        <div class="stats">
          <div class="stat">
            <div class="num">${t.ukupno.toFixed(2)}</div>
            <div class="lbl">Ukupno (zbir 4 godine)</div>
          </div>
        </div>
      `;
    } else {
      content.innerHTML = `<div class="empty">Pavle Palikuća nije pronađen u trenutnim podacima.</div>`;
    }

    let updated = document.getElementById('updatedLine');
    if (!updated) {
      updated = document.createElement('div');
      updated.id = 'updatedLine';
      updated.className = 'updated';
      content.after(updated);
    }
    const dt = new Date(data.updatedAt);
    updated.textContent = (opts.live ? 'Osvježeno upravo sada: ' : 'Ažurirano: ') + dt.toLocaleString('sr-RS');

    const tbody = document.getElementById('rankBody');
    tbody.innerHTML = data.lista.map(p => `
      <tr class="${t && p.rang === t.rang ? 'highlight' : ''}">
        <td>${p.rang}</td>
        <td>${p.ime} ${p.prezime}</td>
        <td>${p.ukupno.toFixed(2)}</td>
      </tr>
    `).join('');
  }

  function computeFromRaw(all) {
    const filtered = all.filter(
      p => p.sfrPrijemniGrupa === GRUPA_ID && p.sfrPrijemniProfil === PROFIL_ID
    );
    const lista = filtered.map(p => ({
      ime: p.ime,
      srednjeIme: p.srednjeIme,
      prezime: p.prezime,
      ukupno: Math.round((p.uspeh1 + p.uspeh2 + p.uspeh3 + p.uspeh4) * 10000) / 10000,
      zavrseniDokumenti: p.zavrseniDokumenti,
      status: p.status,
    }));
    lista.sort((a, b) => b.ukupno - a.ukupno);
    lista.forEach((p, i) => { p.rang = i + 1; });

    const tIme = normalize(TARGET_IME_RAW);
    const tPrezime = normalize(TARGET_PREZIME_RAW);
    const target = lista.find(p => normalize(p.ime) === tIme && normalize(p.prezime) === tPrezime);

    return {
      updatedAt: new Date().toISOString(),
      ukupnoKandidata: lista.length,
      target: target || null,
      lista,
    };
  }

  async function loadInitial() {
    const content = document.getElementById('content');
    try {
      const res = await fetch('data.json?_=' + Date.now());
      if (!res.ok) throw new Error('Ne mogu da učitam data.json');
      const data = await res.json();
      render(data, { live: false });
    } catch (err) {
      content.innerHTML = `<div class="empty">Greška pri učitavanju podataka: ${err.message}</div>`;
    }
  }

  async function refreshLive() {
    const btn = document.getElementById('refreshBtn');
    const status = document.getElementById('refreshStatus');
    btn.disabled = true;
    btn.classList.add('spinning');
    status.className = 'refresh-status';
    status.textContent = 'Povlačim najsvježije podatke…';

    try {
      const res = await fetch(API_URL, {
        headers: { accept: 'application/json, text/plain, */*' },
      });
      if (!res.ok) throw new Error(`Server je vratio grešku (${res.status})`);
      const all = await res.json();
      const data = computeFromRaw(all);
      render(data, { live: true });
      status.textContent = '';
    } catch (err) {
      status.className = 'refresh-status error';
      status.textContent = 'Direktno osvježavanje iz browsera nije uspjelo (vjerovatno ograničenje servera - CORS). Podaci ispod su i dalje posljednji sačuvani.';
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.classList.remove('spinning');
    }
  }

  loadInitial();
</script>

</body>
</html>
